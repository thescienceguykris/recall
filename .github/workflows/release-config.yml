name: Release Config

on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'compiler/**'
  pull_request:
    branches:
      - main
    paths:
      - 'config/**'
      - 'compiler/**'
  workflow_call:
    inputs:
      existing_tag:
        description: 'Attach config assets to this existing release tag instead of creating a new one'
        required: false
        type: string
  workflow_dispatch:

jobs:
  validate:
    name: Validate policy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build compiler
        working-directory: compiler
        run: go build -o echo-acl-compiler .

      - name: Validate policy
        working-directory: compiler
        run: ./echo-acl-compiler validate --input ../config/acl.yaml

  release:
    name: Render and release
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build compiler
        working-directory: compiler
        run: go build -o echo-acl-compiler .

      - name: Render policy
        working-directory: compiler
        run: ./echo-acl-compiler render --input ../config/acl.yaml --output ../config/acl.json

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.existing_tag }}" ]; then
            echo "tag=${{ inputs.existing_tag }}" >> $GITHUB_OUTPUT
            echo "create_release=false" >> $GITHUB_OUTPUT
          else
            git fetch --tags
            LATEST=$(git tag -l 'v*' | sort -V | tail -1)
            if [ -z "$LATEST" ]; then
              LATEST="v0.0.0"
            fi
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            NEW="v${MAJOR}.$((MINOR + 1)).0"
            echo "tag=$NEW" >> $GITHUB_OUTPUT
            echo "create_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Create release with config assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: ${{ steps.tag.outputs.create_release }}
          files: |
            config/acl.json
            config/dns.json

name: Build and Push Container

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      new_tag: ${{ steps.new_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Bump major version
        id: new_tag
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          NEW="v$((MAJOR + 1)).0.0"
          echo "tag=$NEW" >> $GITHUB_OUTPUT

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.new_tag.outputs.tag }}
          name: ${{ steps.new_tag.outputs.tag }}
          generate_release_notes: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.new_tag.outputs.tag }}
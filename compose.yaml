services:
  recall:
    build: .
    ports:
      - "8088:8080"
    environment:
      ADDR: ":8080"
      DATA_DIR: "/data"
      # Defaults are suitable for a trusted local network. For multi-user
      # deployments, set STORE_TYPE=postgres and AUTH_MODE=oidc in .env, then
      # start with: docker compose --profile postgres up --build
      STORE_TYPE: "${STORE_TYPE:-json}"
      DB_PATH: "/data/recall-db.json"
      DATABASE_URL: "${DATABASE_URL:-postgres://recall:recall@postgres:5432/recall?sslmode=disable}"
      AUTH_MODE: "${AUTH_MODE:-none}"
      OIDC_ISSUER_URL: "${OIDC_ISSUER_URL:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URL: "${OIDC_REDIRECT_URL:-}"
      SESSION_SECRET: "${SESSION_SECRET:-}"
      AUTH_ALLOWED_EMAILS: "${AUTH_ALLOWED_EMAILS:-}"
      AUTH_ALLOWED_DOMAINS: "${AUTH_ALLOWED_DOMAINS:-}"
      TRANSCRIBER_TYPE: "openai"
      WHISPER_BASE_URL: "http://whisper:9000"
      LLM_BASE_URL: "${LLM_BASE_URL}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL}"
      JOB_TIMEOUT_SECONDS: "3600"
      YTDLP_EXTRA_ARGS: "${YTDLP_EXTRA_ARGS:-}"
      # Optional escape hatch for YouTube breakages or authenticated videos.
      # Use equals-style args because this env var is split on whitespace.
    volumes:
      - recall-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:17
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: recall
      POSTGRES_USER: recall
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-recall}"
    volumes:
      - recall-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recall -d recall"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  whisper:
    image: hwdsl2/whisper-server:latest
    ports:
      - "8000:9000"
    volumes:
      - whisper-models:/var/lib/whisper
    environment:
      WHISPER_MODEL: "small.en"
      WHISPER_DIARIZATION: "true"
      WHISPER_DIARIZE_NUM_SPEAKERS: "-1"
      WHISPER_DIARIZE_MAX_SPEAKERS: "-1"
      WHISPER_DIARIZE_THRESHOLD: "0.5"
      WHISPER_WORD_TIMESTAMPS: "true"
    restart: unless-stopped

volumes:
  recall-data:
  recall-postgres:
  whisper-models:
